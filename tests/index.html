	<script>
		// Setup a keydown event (up) to test that it's not being overwritten
		const one = '1', two = '2', three = '3', four = '4', five = '5', six = '6';
		document.onkeydown = function(one, two, three, four, five) {let test = true};
		window.onresize = function(one, two, three, four, five, six) {let test = true};

		// Minimal Chrome API stubs so page-turner.js can run in a normal browser.
		// IMPORTANT: Don't redeclare `chrome` (Chrome already defines window.chrome).
		window.chrome = window.chrome || {};
		window.chrome.runtime = window.chrome.runtime || {};
		window.chrome.runtime.sendMessage = window.chrome.runtime.sendMessage || function () {};
		window.chrome.storage = window.chrome.storage || {};
		window.chrome.storage.local = window.chrome.storage.local || {};

		// Provide callback shapes similar to the real API.
		window.chrome.storage.local.get = window.chrome.storage.local.get || function (key, cb) {
			if (typeof cb === 'function') cb({});
		};
		window.chrome.storage.local.set = window.chrome.storage.local.set || function (obj, cb) {
			if (typeof cb === 'function') cb();
		};
	</script>
	<!-- main page turner functions -->
